experiment:
  name: layered-depth-server-stable
  seed: 42

hardware:
  device: cuda
  target_gpu_class: rtx6000_24gb_class
  min_vram_gb: 24
  num_workers: 0
  compile_model: false
  amp: true
  amp_dtype: bfloat16
  force_fp32_impl: true

data:
  train_dataset_name: princeton-vl/LayeredDepth-Syn
  train_split: train
  val_dataset_name: princeton-vl/LayeredDepth-Syn
  val_split: validation
  cache_dir: /mnt/home2/home/yash_g/.cache/huggingface/datasets
  staged_root: /mnt/home2/home/yash_g/layered_depth
  require_local_staging: true
  pin_memory: false
  persistent_workers: false
  prefetch_factor: 1
  batch_size: 12
  val_batch_size: 2
  depth_scale: 1000.0
  depth_clip_min: 1.0e-3
  depth_clip_max: 30.0
  max_layers: 8
  use_precomputed_dino: true
  precomputed_index_path: /mnt/home2/home/yash_g/layered_depth/features/index.json
  precomputed_max_cached_shards: 1

architecture:
  strategy: concat
  base_channels: 64
  num_sfin: 2
  num_rhag: 3
  window_size: 7
  use_gradient_checkpointing: false
  fft_mode: fp32
  fft_pad_size: 256
  dino_embed_dim: 768
  backbone_repo: timm
  backbone_model: timm/convnext_small.dinov3_lvd1689m
  backbone_backend: timm_hf
  backbone_stop_on_failure: true
  backbone_fallback_approved: false
  backbone_fallback_models:
    - backbone_repo: facebookresearch/dinov3
      backbone_model: dinov3_vitb16
      backbone_backend: torch_hub
  max_layer_id: 8

training:
  epochs: 100
  accum_steps: 1
  dynamic_layers_enabled: true
  strict_empty_target: false
  auto_disable_amp_on_overflow: true
  amp_overflow_patience: 8
  amp_disable_scale_threshold: 128.0
  max_consecutive_nonfinite_steps: 4
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2
  grad_clip_norm: 1.0
  scheduler:
    name: cosine
    t_max_epochs: 100
    eta_min: 1.0e-6
  checkpoint:
    dir: ./runs/current/checkpoints
    latest_name: latest_checkpoint.pth
    best_name: best_checkpoint.pth
    save_every_epochs: 1
  curriculum:
    enabled: true
    midpoint_fraction: 0.5
    decoder_weight: 0.5
    bottleneck_weight: 0.25
    min_decay: 0.1
  staged_losses:
    enabled: true
    mode: flow_staged
    stage_a_fraction: 0.3
    stage_b_fraction: 0.7
    flow_weight: 1.0
    ssi_weight: 1.0
    wavelet_weight: 0.02
    ordinal_weight: 0.05
    ordinal_margin: 1.0e-2
    smoothness_weight: 0.01
    flow_t_low: 0.0
    flow_t_high: 1.0
    wavelet_family: sym4
    wavelet_levels: 2
    wavelet_fallback_family: bior3.5

logging:
  use_wandb: true
  project: layered-depth-estimation
  entity: null
  run_name: server-run-stable
  wandb_dir: ./runs/current/wandb
  mode: online
  log_every_steps: 20
  train_log_every_steps: 20
  log_to_terminal: true
  verbose_components: true
  watch_model: true
  watch_log: gradients
  watch_log_freq: 200

evaluation:
  run_after_train: true
  run_synth_validation: true
  run_real_tuple_eval: true
  multi_pass_real_eval: true
  periodic_real_eval_every_epochs: 10
  periodic_real_max_samples: 200
  real_dataset_name: princeton-vl/LayeredDepth
  real_splits: [validation, test]
  real_layer_keys: [layer_all, layer_first]
  target_layer: 1
  synth_max_batches: 0
  real_max_samples: 0
  report_dir: ./runs/current/reports
  checkpoint_name: best_checkpoint.pth
  stage_b_gate:
    enabled: true
    min_pairs_acc: 0.05
    require_non_decreasing_pairs_trend: true
    min_points: 2
    trend_eps: 1.0e-8
    report_dir: ./runs/current/reports
    source_report: ./runs/current/reports/final_report.json

auth:
  require_wandb_login: true
  require_hf_login: false
