experiment:
  name: layered-depth-quickcheck-local
  seed: 42

hardware:
  device: cuda
  num_workers: 0
  compile_model: false
  amp: true

data:
  train_dataset_name: princeton-vl/LayeredDepth-Syn
  train_split: train
  val_dataset_name: princeton-vl/LayeredDepth-Syn
  val_split: validation
  cache_dir: /home/yash_gupta/.cache/huggingface/datasets
  staged_root: /home/yash_gupta/.cache/huggingface/datasets
  require_local_staging: false
  pin_memory: true
  persistent_workers: false
  batch_size: 1
  val_batch_size: 1
  max_layers: 8
  use_precomputed_dino: false
  precomputed_index_path: ./local_cache/features/index.json

architecture:
  strategy: concat
  base_channels: 16
  num_sfin: 1
  num_rhag: 1
  window_size: 7
  use_gradient_checkpointing: false
  fft_mode: fp32
  fft_pad_size: 256
  dino_embed_dim: 768
  backbone_repo: timm
  backbone_model: timm/convnext_small.dinov3_lvd1689m
  backbone_backend: timm_hf
  backbone_stop_on_failure: true
  backbone_fallback_approved: false
  backbone_fallback_models:
    - backbone_repo: facebookresearch/dinov3
      backbone_model: dinov3_vitb16
      backbone_backend: torch_hub
  max_layer_id: 8

training:
  epochs: 2
  accum_steps: 1
  dynamic_layers_enabled: true
  strict_empty_target: false
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2
  grad_clip_norm: 1.0
  scheduler:
    name: cosine
    t_max_epochs: 1
    eta_min: 1.0e-6
  checkpoint:
    dir: ./runs/current/quickcheck/checkpoints
    latest_name: latest_checkpoint.pth
    best_name: best_checkpoint.pth
    save_every_epochs: 1
  curriculum:
    enabled: true
    midpoint_fraction: 0.5
    decoder_weight: 0.5
    bottleneck_weight: 0.25
  staged_losses:
    enabled: true
    mode: flow_staged
    stage_a_fraction: 0.5
    stage_b_fraction: 0.8
    flow_weight: 1.0
    ssi_weight: 1.0
    wavelet_weight: 0.02
    ordinal_weight: 0.05
    ordinal_margin: 1.0e-2
    smoothness_weight: 0.01
    flow_t_low: 0.0
    flow_t_high: 1.0
    wavelet_family: sym4
    wavelet_levels: 2
    wavelet_fallback_family: bior3.5

logging:
  use_wandb: true
  project: layered-depth-estimation
  entity: null
  run_name: quickcheck-local
  wandb_dir: ./runs/current/wandb
  mode: dryrun
  log_every_steps: 1
  train_log_every_steps: 1
  log_to_terminal: true
  verbose_components: true
  watch_model: false
  watch_log: gradients
  watch_log_freq: 10

evaluation:
  run_after_train: false
  run_synth_validation: true
  run_real_tuple_eval: true
  multi_pass_real_eval: true
  real_dataset_name: princeton-vl/LayeredDepth
  stage_a_gate:
    enabled: true
    min_pairs_acc: 0.05
    require_non_decreasing_pairs_trend: true
    min_points: 2
    trend_eps: 1.0e-8
    report_dir: ./runs/current/reports
  real_split: validation
  real_layer_key: layer_all
  target_layer: 1
  synth_max_batches: 5
  real_max_samples: 20
  report_dir: ./runs/current/quickcheck/reports
  checkpoint_name: best_checkpoint.pth

auth:
  require_wandb_login: false
  require_hf_login: false
